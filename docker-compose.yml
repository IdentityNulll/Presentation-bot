version: '3.8'

services:
  db:
    image: mongo:6.0-jammy
    container_name: slidepaw-db
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
      MONGO_INITDB_DATABASE: slidepaw
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - mongodata:/data/db

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: slidepaw-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=mongodb://admin:adminpassword@db:27017/slidepaw?authSource=admin
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - JWT_SECRET=${JWT_SECRET:-slidepaw-secret-jwt-key}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - NODE_ENV=production
      - LOG_LEVEL=info
      - PORT=5000
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/status"]
      interval: 10s
      timeout: 5s
      retries: 3

  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
    container_name: slidepaw-admin
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

  miniapp:
    build:
      context: .
      dockerfile: miniapp/Dockerfile
    container_name: slidepaw-miniapp
    restart: always
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  mongodata:
